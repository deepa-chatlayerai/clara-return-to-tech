version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: clara_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clara
      POSTGRES_PASSWORD: clara_password
      POSTGRES_DB: clara_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
